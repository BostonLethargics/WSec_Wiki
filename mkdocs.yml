site_name: WSec Wiki
site_url: https://sitename.example
theme:
  name: material
  palette:
    scheme: default  
    primary: grey
  logo: assets/wseciconstripes1.png

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

plugins:
  - search
  - glightbox:
      touchNavigation: true
      loop: false
      width: 90%
      height: auto


extra_css:
  - assets/stylesheets/extra.css

